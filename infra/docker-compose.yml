version: '3.9'
services:
  event-bus:
    image: eclipse-mosquitto:2
    container_name: stark-event-bus
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  friday-core:
    build:
      context: ../modules/friday-core
    environment:
      FRIDAY_ENV: development
    depends_on:
      - event-bus

  heads-up:
    build:
      context: ../modules/heads-up
    ports:
      - "3000:3000"
    depends_on:
      - friday-core

  bench-bot:
    build:
      context: ../modules/bench-bot
    depends_on:
      - event-bus
