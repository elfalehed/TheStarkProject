name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.services.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - id: services
        run: |
          python scripts/ci/discover_services.py --format github > services.json
          echo "matrix=$(cat services.json)" >> "$GITHUB_OUTPUT"

  package-and-release:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Build container image metadata
        run: |
          echo "SERVICE=${{ matrix.service }}" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.ref_name }}" >> "$GITHUB_ENV"
      - name: Build image
        run: |
          if [ -f modules/${{ matrix.service }}/Dockerfile ]; then
            docker build -t "$IMAGE" modules/${{ matrix.service }}
          else
            echo "No Dockerfile for $SERVICE; skipping image build"
          fi
      - name: Publish image
        if: env.IMAGE != ''
        run: |
          echo "Publishing $IMAGE"
